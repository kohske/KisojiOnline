<html lang="$lang$">
<head>

  <link rel="stylesheet" href="$css$"/>

  <!-- 独自のカスタムCSSもOK -->
  <style>
    main { max-width: 800px; margin: 1rem auto; }
    header, footer { text-align: center; margin-bottom: 0rem; }

    </article>

    <hr/>
    <footer>
      <p><a href="/index.html">ミネルヴァ書房「心理学実験」実験演習</a></p>

    </footer>

</html>
